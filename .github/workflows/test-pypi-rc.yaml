name: TestPyPI - Release Candidate (RC)

on:
  push:
    tags:
      - "v*-rc*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
      
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      
      - name: Install PortAudio
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev
      
      - name: Install dependencies
        run: poetry install
      
      - name: Run pytest
        run: poetry run pytest
      
      # - name: Run flake8
      #   run: poetry run flake8 whisperpipe/
      
      # - name: Run black format check
      #   run: poetry run black --check whisperpipe/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
      
      - name: Build distributions
        run: poetry build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions-rc
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: test-release
    
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions-rc
          path: dist/
      
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
      
      - name: Echo test installation command
        run: |
          TAG_VERSION="${{ github.ref }}"
          TAG_VERSION="${TAG_VERSION#refs/tags/}"
          echo "✅ Published to TestPyPI!"
          echo "📦 To test installation run:"
          echo "pip install --index-url https://test.pypi.org/simple/ whisperpipe==${TAG_VERSION}"